        function switchTab(tabId) {
            if(isSpinning) return;

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active', 'border-b-2', 'border-orange-500', 'text-orange-500', 'font-semibold');
                btn.classList.add('text-gray-500');
            });
            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.classList.remove('text-gray-500');
            activeBtn.classList.add('active', 'border-b-2', 'border-orange-500', 'text-orange-500', 'font-semibold');

            document.getElementById('content-spin').classList.add('hidden');
            document.getElementById('content-restaurants').classList.add('hidden');
            document.getElementById('content-categories').classList.add('hidden');

            document.getElementById(`content-${tabId}`).classList.remove('hidden');
            
            if(tabId === 'spin') updateSpinStats();
        }

        // --- ROOM ACTIONS ---
        function copyShareLink() {
            const url = window.location.href;
            
            // Try modern clipboard API first
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(url).then(() => {
                    showToast("Invite link copied! Send it to your friends.", "success");
                }).catch(err => {
                    fallbackCopyTextToClipboard(url);
                });
            } else {
                fallbackCopyTextToClipboard(url);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("Invite link copied! Send it to your friends.", "success");
            } catch (err) {
                showToast("Failed to copy link. Please copy URL manually.", "error");
            }
            document.body.removeChild(textArea);
        }

        function createNewRoom() {
            // Generate a fresh random room ID and reload the page with it
            const newRoom = Math.random().toString(36).substring(2, 8).toUpperCase();
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?room=' + newRoom;
